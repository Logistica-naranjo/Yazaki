<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAZAKI · Dashboard Cliente · E4</title>
<style>
  :root{
    --bg: #14161a;
    --bg-elev: #1d2026;
    --bg-elev-2: #262a32;
    --border: #333844;
    --text: #eef0f3;
    --text-dim: #9aa1ad;
    --orange: #ff7a1a;
    --orange-soft: #ff9a4d;
    --green: #35c77e;
    --yellow: #e8c547;
    --red: #ef4d4d;
    --radius: 12px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;}

  header{
    padding: 22px 28px 18px 28px; border-bottom:1px solid var(--border);
    background: linear-gradient(180deg, #17191d 0%, #14161a 100%);
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
  }
  .brand{ display:flex; align-items:center; gap:12px; }
  .logo{
    width:42px; height:42px; border-radius:10px;
    background: linear-gradient(135deg, var(--orange), var(--orange-soft));
    display:flex; align-items:center; justify-content:center;
    font-weight:800; color:#1a1200; font-size:16px;
  }
  .brand-title{ font-size:19px; font-weight:800; letter-spacing:0.2px; }
  .brand-sub{ font-size:12.5px; color:var(--text-dim); margin-top:2px; }
  .updated-tag{ font-size:11.5px; color:var(--text-dim); text-align:right; }

  main{ max-width: 1120px; margin: 0 auto; padding: 24px 20px 60px 20px; }

  .hero{
    display:grid; grid-template-columns: 1.1fr 1fr; gap:16px; margin-bottom:22px;
  }
  @media (max-width: 780px){ .hero{ grid-template-columns: 1fr; } }

  .card{ background: var(--bg-elev); border:1px solid var(--border); border-radius: var(--radius); padding:20px; }

  .hero-main .label{ font-size:12.5px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.6px; }
  .hero-main .big-pct{ font-size:52px; font-weight:800; line-height:1.1; margin: 6px 0 2px 0; }
  .hero-main .big-pct span{ font-size:24px; color:var(--text-dim); font-weight:600; }
  .hero-track{ height:14px; border-radius:99px; background:var(--bg-elev-2); overflow:hidden; margin-top:14px; position:relative; }
  .hero-fill{ height:100%; background: linear-gradient(90deg, var(--orange), var(--orange-soft)); border-radius:99px; }
  .hero-plan-marker{ position:absolute; top:-3px; width:3px; height:20px; background:#ffffffaa; }
  .hero-legend{ display:flex; justify-content:space-between; font-size:12px; color:var(--text-dim); margin-top:8px; }

  .stat-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
  .stat-box{ background: var(--bg-elev-2); border-radius:10px; padding:14px; }
  .stat-box .stat-label{ font-size:11.5px; color:var(--text-dim); text-transform:uppercase; }
  .stat-box .stat-val{ font-size:22px; font-weight:800; margin-top:4px; }
  .stat-val.pos{ color: var(--green); }
  .stat-val.neg{ color: var(--red); }

  h2.section-title{ font-size:15px; font-weight:700; margin: 30px 0 14px 0; color: var(--text); }

  .areas-grid{ display:grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap:14px; }
  .area-card{ background: var(--bg-elev); border:1px solid var(--border); border-radius: var(--radius); padding:16px; }
  .area-name{ font-size:13.5px; font-weight:700; margin-bottom:2px; }
  .area-peso{ font-size:11px; color:var(--text-dim); margin-bottom:10px; }
  .area-track{ height:9px; border-radius:99px; background:var(--bg-elev-2); overflow:hidden; position:relative; }
  .area-fill{ height:100%; background: linear-gradient(90deg, var(--orange), var(--orange-soft)); border-radius:99px; }
  .area-plan-marker{ position:absolute; top:-2px; width:2px; height:13px; background:#ffffff88; }
  .area-numbers{ display:flex; justify-content:space-between; font-size:11.5px; color:var(--text-dim); margin-top:6px; }
  .area-badge{ display:inline-block; margin-top:8px; font-size:10.5px; font-weight:700; padding:3px 8px; border-radius:99px; }
  .area-badge.green{ background:#35c77e22; color:var(--green); }
  .area-badge.yellow{ background:#e8c54722; color:var(--yellow); }
  .area-badge.red{ background:#ef4d4d22; color:var(--red); }

  table{ width:100%; border-collapse: collapse; margin-top:6px; }
  th, td{ text-align:left; padding: 10px 12px; font-size:12.5px; border-bottom:1px solid var(--border); }
  th{ color:var(--text-dim); text-transform:uppercase; font-size:10.5px; letter-spacing:0.4px; }
  td.num{ text-align:right; font-variant-numeric: tabular-nums; }
  tr:hover td{ background: var(--bg-elev-2); }
  .mini-badge{ font-size:10px; font-weight:700; padding:2px 7px; border-radius:99px; }
  .mini-badge.green{ background:#35c77e22; color:var(--green); }
  .mini-badge.yellow{ background:#e8c54722; color:var(--yellow); }
  .mini-badge.red{ background:#ef4d4d22; color:var(--red); }

  .loading, .empty-state{ text-align:center; color:var(--text-dim); padding: 60px 20px; font-size:13px; }

  footer{ text-align:center; padding: 24px; color: var(--text-dim); font-size:11.5px; border-top:1px solid var(--border); }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="logo">E4</div>
    <div>
      <div class="brand-title">YAZAKI &middot; Avance de Proyecto</div>
      <div class="brand-sub">Constructora E4 SA</div>
    </div>
  </div>
  <div class="updated-tag" id="updatedTag">Cargando...</div>
</header>

<main id="mainContent">
  <div class="loading">Cargando informacion del proyecto...</div>
</main>

<footer>Constructora E4 SA &middot; Sistema de monitoreo YAZAKI</footer>

<script>
// ============================================================
// CONFIGURACION: reemplazar por la URL real del Worker desplegado
// ============================================================
var var API_BASE = "https://yazaki.juanfernando-solares.workers.dev";

function fmtPct(v) {
  return Math.round(v * 100) + "%";
}

function fmtPctSigned(v) {
  var p = Math.round(v * 100);
  return (p > 0 ? "+" : "") + p + "%";
}

function statusFromDeviation(desv) {
  if (desv >= 0) return { cls: "green", label: "Al dia" };
  if (desv >= -0.05) return { cls: "yellow", label: "Leve atraso" };
  return { cls: "red", label: "Atrasado" };
}

function renderDashboard(summary) {
  var g = summary.global;
  var gStatus = statusFromDeviation(g.desviacion);

  var html = "";

  html += '<div class="hero">';

  html += '  <div class="card hero-main">';
  html += '    <div class="label">Avance ponderado del proyecto (por duracion de actividades)</div>';
  html += '    <div class="big-pct">' + fmtPct(g.pctReal) + ' <span>real</span></div>';
  html += '    <div class="hero-track">';
  html += '      <div class="hero-fill" style="width:' + Math.round(g.pctReal * 100) + '%"></div>';
  html += '      <div class="hero-plan-marker" style="left:' + Math.round(g.pctPlan * 100) + '%"></div>';
  html += '    </div>';
  html += '    <div class="hero-legend"><span>Plan: ' + fmtPct(g.pctPlan) + '</span><span>Real: ' + fmtPct(g.pctReal) + '</span></div>';
  html += '  </div>';

  html += '  <div class="card">';
  html += '    <div class="stat-grid">';
  html += '      <div class="stat-box"><div class="stat-label">Desviacion global</div><div class="stat-val ' + (g.desviacion >= 0 ? "pos" : "neg") + '">' + fmtPctSigned(g.desviacion) + '</div></div>';
  html += '      <div class="stat-box"><div class="stat-label">Estado</div><div class="stat-val" style="font-size:16px;">' + gStatus.label + '</div></div>';
  html += '      <div class="stat-box"><div class="stat-label">Tareas trackeadas</div><div class="stat-val" style="font-size:22px;">' + summary.totalTareas + '</div></div>';
  html += '      <div class="stat-box"><div class="stat-label">Duracion total (dias)</div><div class="stat-val" style="font-size:22px;">' + g.totalDur + '</div></div>';
  html += '    </div>';
  html += '  </div>';

  html += '</div>';

  html += '<h2 class="section-title">Avance por area</h2>';
  html += '<div class="areas-grid">';
  summary.areas.forEach(function (a) {
    var st = statusFromDeviation(a.desviacion);
    html += '  <div class="area-card">';
    html += '    <div class="area-name">' + a.area + '</div>';
    html += '    <div class="area-peso">Peso en el proyecto: ' + fmtPct(a.pesoProyecto) + ' (' + a.dur + ' dias)</div>';
    html += '    <div class="area-track">';
    html += '      <div class="area-fill" style="width:' + Math.round(a.pctReal * 100) + '%"></div>';
    html += '      <div class="area-plan-marker" style="left:' + Math.round(a.pctPlan * 100) + '%"></div>';
    html += '    </div>';
    html += '    <div class="area-numbers"><span>Plan ' + fmtPct(a.pctPlan) + '</span><span>Real ' + fmtPct(a.pctReal) + '</span></div>';
    html += '    <div class="area-badge ' + st.cls + '">' + st.label + '</div>';
    html += '  </div>';
  });
  html += '</div>';

  html += '<h2 class="section-title">Detalle por proceso</h2>';
  html += '<div class="card" style="padding:6px 16px 12px 16px;">';
  html += '<table><thead><tr><th>Area</th><th>Proceso</th><th class="num">Plan</th><th class="num">Real</th><th class="num">Desviacion</th><th>Estado</th></tr></thead><tbody>';
  summary.procesos.forEach(function (p) {
    var st = statusFromDeviation(p.desviacion);
    html += '<tr>';
    html += '  <td>' + p.area + '</td>';
    html += '  <td>' + p.proceso + '</td>';
    html += '  <td class="num">' + fmtPct(p.pctPlan) + '</td>';
    html += '  <td class="num">' + fmtPct(p.pctReal) + '</td>';
    html += '  <td class="num">' + fmtPctSigned(p.desviacion) + '</td>';
    html += '  <td><span class="mini-badge ' + st.cls + '">' + st.label + '</span></td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  html += '</div>';

  document.getElementById("mainContent").innerHTML = html;

  var updated = new Date(summary.generadoEn);
  document.getElementById("updatedTag").innerHTML =
    "Actualizado: " + updated.toLocaleDateString("es-GT") + " " + updated.toLocaleTimeString("es-GT");
}

function loadSummary() {
  fetch(API_BASE + "/api/summary")
    .then(function (r) { return r.json(); })
    .then(function (summary) {
      renderDashboard(summary);
    })
    .catch(function () {
      document.getElementById("mainContent").innerHTML =
        '<div class="empty-state">No se pudo cargar la informacion del proyecto.<br>Intenta de nuevo mas tarde.</div>';
      document.getElementById("updatedTag").textContent = "Sin conexion";
    });
}

loadSummary();
setInterval(loadSummary, 60000);
</script>

</body>
</html>
